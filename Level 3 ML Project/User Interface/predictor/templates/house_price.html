{% extends 'base.html' %}

{% block title %}House Price Predictor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4 text-center">Lagos House Price Predictor</h2>
        
        <div class="card p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Predict Price</button>
                </div>
            </form>
            
            {% if prediction %}
                <div class="result-box result-neutral mt-4">
                    <h4>Predicted Property Price:</h4>
                    <h1 class="display-5 text-primary fw-bold">{{ prediction }}</h1>
                </div>
            {% endif %}
        </div>
        <div class="mt-3 text-center">
            <a href="{% url 'home' %}" class="text-decoration-none">← Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
