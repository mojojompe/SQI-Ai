<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI ML Predictor{% endblock %}</title>
    <!-- Add Bootstrap for easy modern styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: #ecf0f1 !important; }
        .hero { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 4rem 0; text-align: center; margin-bottom: 2rem;}
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px;}
        .result-box { padding: 20px; text-align: center; border-radius: 8px; margin-top: 20px;}
        .result-approved { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb;}
        .result-denied { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb;}
        .result-neutral { background-color: #e2e3e5; color: #383d41; border: 2px solid #d6d8db;}
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}"> SQI ML Predictor</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'house_price' %}">House Prices</a>
                <a class="nav-link" href="{% url 'loan_approver' %}">Loan Approver</a>
            </div>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
